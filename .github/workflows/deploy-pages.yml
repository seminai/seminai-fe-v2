name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build static site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Write build version
        run: |
          echo "Build timestamp: $(date -u +"%Y-%m-%dT%H:%M:%SZ")" > public/build-version.txt
          echo "Commit: $GITHUB_SHA" >> public/build-version.txt

      - name: Build
        run: npm run build
        env:
          COMMIT_SHA: ${{ github.sha }}
          VITE_API_URL: https://seminai-be-v2-661301438659.europe-west1.run.app
          VITE_GOOGLE_CLIENT_ID: 661301438659-s1k70moupqvu486rlr07ul3b563qtbh4.apps.googleusercontent.com
          VITE_REGISTRATION_CODE: benvenutodaclariceefrancescoteamseminai2026

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
