map $http_accept $markdown_variant {
    default "";
    "~*text/markdown" ".md";
}

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;
    server_name localhost;
    charset utf-8;
    charset_types text/markdown application/json application/linkset+json;

    include /etc/nginx/mime.types;
    types {
        text/markdown md;
    }

    add_header Vary "Accept" always;
    add_header Link '</sitemap.xml>; rel="sitemap"; type="application/xml"' always;
    add_header Link '</llms.txt>; rel="describedby"; type="text/plain"' always;
    add_header Link '</.well-known/api-catalog>; rel="api-catalog"; type="application/linkset+json"' always;
    add_header Link '</.well-known/agent-skills/index.json>; rel="service-desc"; type="application/json"' always;

    error_page 500 502 503 504 /50x.html;

    location = / {
        try_files /index$markdown_variant /index.html;
    }

    location = /privacy-policy {
        try_files /privacy-policy$markdown_variant /privacy-policy/index.html /index.html;
    }

    location = /privacy-policy/ {
        try_files /privacy-policy$markdown_variant /privacy-policy/index.html /index.html;
    }

    location = /cookie-policy {
        try_files /cookie-policy$markdown_variant /cookie-policy/index.html /index.html;
    }

    location = /cookie-policy/ {
        try_files /cookie-policy$markdown_variant /cookie-policy/index.html /index.html;
    }

    location = /terms-of-service {
        try_files /terms-of-service$markdown_variant /terms-of-service/index.html /index.html;
    }

    location = /terms-of-service/ {
        try_files /terms-of-service$markdown_variant /terms-of-service/index.html /index.html;
    }

    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        try_files /.well-known/api-catalog =404;
    }

    location = /50x.html {
        root /usr/share/nginx/html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
