map $http_accept $markdown_variant {
    default "";
    "~*text/markdown" ".md";
}

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;
    server_name localhost;
    charset utf-8;
    charset_types text/markdown application/json application/linkset+json application/vnd.oai.openapi+json;

    include /etc/nginx/mime.types;
    types {
        text/markdown md;
        application/manifest+json webmanifest;
    }

    add_header Vary "Accept" always;
    add_header Link '</.well-known/api-catalog>; rel="api-catalog"; type="application/linkset+json", </llms.txt>; rel="describedby"; type="text/plain", </llms-full.txt>; rel="describedby"; type="text/plain", </.well-known/agent-skills/index.json>; rel="service-desc"; type="application/json", <https://seminai-be-v2-661301438659.europe-west1.run.app/api-docs>; rel="service-doc"; type="text/html", <https://seminai-be-v2-661301438659.europe-west1.run.app/openapi.json>; rel="service-desc"; type="application/vnd.oai.openapi+json"' always;
    add_header Cache-Control "public, max-age=600" always;

    error_page 500 502 503 504 /50x.html;

    location ^~ /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /fonts/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /icons/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location ^~ /og/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location = / {
        try_files /index$markdown_variant /index.html =404;
    }

    location = /index.html {
        try_files /index$markdown_variant /index.html =404;
    }

    location = /privacy-policy {
        try_files /privacy-policy$markdown_variant /privacy-policy/index.html /index.html =404;
    }

    location = /privacy-policy/ {
        try_files /privacy-policy$markdown_variant /privacy-policy/index.html /index.html =404;
    }

    location = /cookie-policy {
        try_files /cookie-policy$markdown_variant /cookie-policy/index.html /index.html =404;
    }

    location = /cookie-policy/ {
        try_files /cookie-policy$markdown_variant /cookie-policy/index.html /index.html =404;
    }

    location = /terms-of-service {
        try_files /terms-of-service$markdown_variant /terms-of-service/index.html /index.html =404;
    }

    location = /terms-of-service/ {
        try_files /terms-of-service$markdown_variant /terms-of-service/index.html /index.html =404;
    }

    location = /.well-known/api-catalog {
        default_type application/linkset+json;
        try_files /.well-known/api-catalog =404;
    }

    location = /50x.html {
        root /usr/share/nginx/html;
    }

    location / {
        try_files $uri $uri/ /index.html =404;
    }
}
