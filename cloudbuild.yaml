steps:
  # Costruisci il container con il Dockerfile
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "build",
        "-t",
        "gcr.io/$PROJECT_ID/seminai-fe-v2:$COMMIT_SHA",
        "--build-arg",
        "VITE_API_URL=https://seminai-be-v2-661301438659.europe-west1.run.app",
        "--build-arg",
        "COMMIT_SHA=$COMMIT_SHA",
        ".",
      ]

  # Push del container su Google Container Registry
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/seminai-fe-v2:$COMMIT_SHA"]

  # Tag anche come 'latest' per riferimento
  - name: "gcr.io/cloud-builders/docker"
    args:
      [
        "tag",
        "gcr.io/$PROJECT_ID/seminai-fe-v2:$COMMIT_SHA",
        "gcr.io/$PROJECT_ID/seminai-fe-v2:latest",
      ]

  # Push del tag latest
  - name: "gcr.io/cloud-builders/docker"
    args: ["push", "gcr.io/$PROJECT_ID/seminai-fe-v2:latest"]

  # Deploy su Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "seminai-fe-v2"
      - "--image=gcr.io/$PROJECT_ID/seminai-fe-v2:$COMMIT_SHA"
      - "--platform=managed"
      - "--region=europe-west1" # Cambia la regione secondo le tue necessità
      - "--allow-unauthenticated" # Rimuovi se vuoi che il servizio richieda autenticazione
      - "--memory=512Mi" # Configura la memoria secondo le tue necessità
      - "--cpu=1" # Configura le CPU secondo le tue necessità
      - "--max-instances=10" # Configura il numero massimo di istanze secondo le tue necessità
      - "--min-instances=0" # Configura il numero minimo di istanze secondo le tue necessità

images:
  - "gcr.io/$PROJECT_ID/seminai-fe-v2:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/seminai-fe-v2:latest"
