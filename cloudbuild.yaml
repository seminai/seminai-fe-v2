steps:
  # Installa le dipendenze
  - name: "gcr.io/cloud-builders/npm"
    args: ["ci"]
  # Crea il file .env per la build
  - name: "bash"
    args:
      - "-c"
      - |
        echo "VITE_API_URL=${_API_URL}" > .env.production
  # Build dell'applicazione
  - name: "gcr.io/cloud-builders/npm"
    args: ["run", "build"]
  # Deploy su Cloud Run
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    entrypoint: "gcloud"
    args:
      - "run"
      - "deploy"
      - "seminai-fe-v2"
      - "--image=gcr.io/$PROJECT_ID/seminai-fe-v2:$COMMIT_SHA"
      - "--platform=managed"
      - "--region=europe-west1" # Cambia la regione secondo le tue necessità
      - "--allow-unauthenticated" # Rimuovi se vuoi che il servizio richieda autenticazione
      - "--memory=512Mi" # Configura la memoria secondo le tue necessità
      - "--cpu=1" # Configura le CPU secondo le tue necessità
      - "--max-instances=10" # Configura il numero massimo di istanze secondo le tue necessità
      - "--min-instances=0" # Configura il numero minimo di istanze secondo le tue necessità

images:
  - "gcr.io/$PROJECT_ID/seminai-fe-v2:$COMMIT_SHA"
  - "gcr.io/$PROJECT_ID/seminai-fe-v2:latest"
